services:
  # Preview environment service
  - type: web
    name: llm-council
    runtime: docker
    plan: free
    region: oregon
    branch: master
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false # User must provide this
      - key: GOOGLE_CLIENT_ID
        sync: false # User must provide this
      - key: DATABASE_URL
        sync: false # User must provide this
      - key: JWT_SECRET_KEY
        sync: false # User must provide this
      - key: RENDER
        value: true

  # Production environment service
  - type: web
    name: llm-council-render
    runtime: docker
    plan: free
    region: oregon
    branch: master
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false # User must provide this
      - key: GOOGLE_CLIENT_ID
        sync: false # User must provide this
      - key: DATABASE_URL
        sync: false # User must provide this
      - key: JWT_SECRET_KEY
        sync: false # User must provide this
      - key: RENDER
        value: true
